<ui:composition template="/agendarReserva/Paso.template.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:h="http://java.sun.com/jsf/html">
    <ui:param name="parametroBean" value="#{paso2MBean}" />
    <ui:param name="agenda_nombre" value="#{paso2MBean.agendaNombre}" />
    <ui:param name="paso_numero" value="2" />
    <ui:param name="paso_texto" value="#{sesionMBean.textos['datos_necesarios']}" />
    <ui:param name="hay_error" value="#{paso2MBean.errorInit}" />
    <ui:param name="clase_columna_izq" value="columnaIzquierda col-sm-8" />
    <ui:param name="clase_columna_der" value="columnaDerecha col-sm-4" />
    <ui:param name="yaExisteReservaCamposClave" value="#{paso2MBean.yaExisteReservaCamposClave}" />
    <ui:param name="recursoSinDisponibilidad" value="false" />

    <ui:define name="descripcion">
        <f:view beforePhase="#{paso2MBean.beforePhase}" >
            <ul class="tips pasoTexto">
                <li><h:outputText value="#{sesionMBean.textos['datos_marcados_obligatorios']}." /></li>
            </ul>
            <p:outputPanel styleClass="descripcionAgenda">
                <pre>
				  <h:outputFormat value="#{paso2MBean.descripcion}" rendered="#{paso2MBean.descripcion != null}"/>
                </pre>
            </p:outputPanel>
            <p:outputPanel styleClass="descripcionAgenda">
                <pre>
				  <h:outputFormat value="#{paso2MBean.descripcionRecurso}" rendered="#{paso2MBean.descripcionRecurso != null}" />
                </pre>
            </p:outputPanel>
        </f:view>
    </ui:define>

    <ui:define name="mensaje">
        <div class="box box-grey datosReserva datoReservaPaso2">
            <div class="fechaHoraReserva">
                <h:outputText value="#{paso2MBean.diaSeleccionado}" styleClass="resaltado">
                    <f:convertDateTime type="date" pattern="dd 'de' MMMM 'de' yyyy" timeZone="#{sesionMBean.timeZone}" locale="#{sesionMBean.locale}"/>
                </h:outputText>
                <h:outputText value=" a las " />
                <h:outputText value="#{paso2MBean.horaSeleccionada}" styleClass="resaltado">
                    <f:convertDateTime type="time" pattern="#{sesionMBean.formatoHora}" timeZone="#{sesionMBean.timeZone}" />
                </h:outputText>
                <h:outputText value=" hs" />
            </div>
            <div>
                <h:outputText value="#{paso2MBean.recursoDescripcion}" />
            </div>
        </div>
    </ui:define>

    <ui:define name="contenido">
        <h:form id="formDin">
            <p:outputPanel>
                <p:outputPanel styleClass="form-horizontal" rendered="#{not empty paso2MBean.tramites}">
                    <fieldset>
                        <legend>
                            <h:outputText value="#{sesionMBean.textos['tramite']}" />
                        </legend>
                        <h:panelGroup id="tramiteGroup" styleClass="form-group" layout="block">
                            <h:outputLabel value="#{sesionMBean.textos['tramite']}" for="tramite" styleClass="col-sm-3 control-label label formularioCampoRequerido" />
                            <p:outputPanel styleClass="col-sm-9">
                                <h:selectOneMenu id="tramite" value="#{paso2MBean.tramiteCodigo}">
                                    <f:selectItems value="#{paso2MBean.tramites}" />
                                </h:selectOneMenu>
                                <p:message for="tramite" styleClass="mensajeError" />
                            </p:outputPanel>
                        </h:panelGroup>
                    </fieldset>
                </p:outputPanel>

                <p:outputPanel id="formulario">
                    <h:panelGroup binding="#{paso2MBean.campos}" layout="block"/>
                </p:outputPanel>

                <fieldset>
                    <legend><h:outputText value="#{sesionMBean.textos['clausula_de_consentimiento_informado']}" /></legend>

                    <div class="form-horizontal">
                        <div class="form-group">
                            <div class="col-sm-12">
                                <p class="cursiva">
                                    <h:outputText value="#{paso2MBean.clausulaConsentimiento}" />
                                </p>
                            </div>
                        </div>
                        <h:panelGroup id="clausula" styleClass="form-group row justify-content-center" layout="block">
                            <h:outputLabel value="#{sesionMBean.textos['terminos_de_la_clausula']}" styleClass="col-sm-6 control-label label formularioCampoRequerido" />
                            <div class="col-sm-6">
                                <p:selectOneRadio id="condiciones"
                                                  value="#{paso2MBean.aceptaCondiciones}" layout="responsive"
                                                  columns="1">
                                    <f:selectItem itemLabel="#{sesionMBean.textos['acepto_los_terminos']}" itemValue="SI" />
                                    <f:selectItem itemLabel="#{sesionMBean.textos['no_acepto_los_terminos']}" itemValue="NO" />
                                </p:selectOneRadio>
                                <p:message id="mensajeCondiciones" for="condiciones" styleClass="mensajeError"/>
                            </div>
                        </h:panelGroup>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>
                        <h:outputText value="#{sesionMBean.textos['verificacion_de_seguridad']}" />
                    </legend>
                    <div class="form-horizontal">
                        <h:panelGroup id="captcha" styleClass="form-group captcha-group" layout="block">
                            <span class="control-label label formularioCampoRequerido captcha-pregunta">
                                <h:outputText value="#{paso2MBean.textoIndicativoCaptcha}" />
                            </span>
                            <div>
                                <h:inputText id="secureText" size="10" styleClass="form-control" value="#{paso2MBean.textoCaptchaUsuario}" />
                                <p:message id="captchaErrorMessage" for="secureText" styleClass="mensajeError"/>
                                <p:commandLink styleClass="recargarCaptcha" id="btnRecargarCaptcha"
                                               value="#{sesionMBean.textos['solicitar_otra_frase']}"
                                               actionListener="#{paso2MBean.recargarCaptcha}"
                                               update="captcha" style="display: block; margin-top: 10px;" />
                            </div>
                        </h:panelGroup>
                    </div>
                </fieldset>

                <div class="container-fluid">
                    <div class="row">
                        <div class="col-6">
                            <h:commandButton styleClass="btn-lg btn-secundario" value="#{sesionMBean.textos['volver_paso_anterior']}" action="#{paso2MBean.pasoAnterior}" />
                        </div>
                        <div class="col-6 d-flex justify-content-end">
                            <h:commandButton styleClass="btn-lg btn-primario" value="#{sesionMBean.textos['confirmar_reserva']}"
                                             action="#{paso2MBean.confirmarReserva}" ajax="false"/>
                        </div>
                    </div>
                </div>
            </p:outputPanel>
        </h:form>
    </ui:define>

    <ui:define name="botones">
        <!-- Botones movidos dentro de formDin -->
    </ui:define>
</ui:composition>
