<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:h="http://java.sun.com/jsf/html"
      lang="#{sesionMBean.idiomaActual}">

<f:view beforePhase="#{parametroBean.beforePhase}" >

    <h:head>
        <title><h:outputText value="#{sesionMBean.textos['nombre_aplicacion']}" /></title>
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
        <meta name="viewport" content="user-scalable=no, width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
        <h:outputScript library="primefaces" name="jquery/jquery.js" />
        <!-- script src="#{request.contextPath}/resources/js/jquery-ui.js" type="text/javascript"></script -->
        <script src="#{request.contextPath}/resources/js/funcionesJS.js" type="text/javascript"></script>
        <script src="#{request.contextPath}/resources/js/bootstrap.min.js" type="text/javascript"></script>
        <link href="#{request.contextPath}/resources/css/bootstrap.min.css" rel="stylesheet" />
        <link href="#{request.contextPath}/resources/css/formulario-tipo.css" rel="stylesheet" />
        <link href="#{request.contextPath}/resources/css/layout.css" rel="stylesheet" />
        <link href="#{request.contextPath}/resources/css/agenda.css" rel="stylesheet" />
        <link href="#{request.contextPath}/resources/css/custom.css" rel="stylesheet" />
    </h:head>

    <h:body class="body">
        <h:outputStylesheet  library="css" name="mensajes.css" />
        <h:outputStylesheet  library="css" name="tables.css" />
        <a class="sr-only sr-only-focusable saltar" href="#content">
            <h:outputText value="#{sesionMBean.textos['saltar_al_contenido']}" />
        </a>

        <input type="hidden" id="formatoFecha" value="#{sesionMBean.formatoFechaDatepicker}" />

        <div class="cabezalPublico">
            <div class="container">
                <div class="row">
                    <div class="col-8 cabezalEmpresa">
                        <div id="logo">
                            <div>
                                <p:graphicImage value="#{sesionMBean.empresaActualLogo}" styleClass="logoEmpresa" alt="#{sesionMBean.empresaActualLogoTexto}"
                                                rendered="#{sesionMBean.empresaActualLogo != null}" ismap="true"/>
                            </div>
                            <div>
                                <h:outputText styleClass="nombre-activo" value="#{sesionMBean.empresaActualNombre}" />
                            </div>
                        </div>
                    </div>
                    <div class="col-4 cabezalTramites">
                        <div class="logosSecundarios">
                            <ul class="listaHorizontal">
                                <li>
                                    <a href="https://www.presidencia.gub.uy/" title="Ir al sitio de Presidencia">
                                        <img src="../resources/images/logoPresidencia.png" alt="Presidencia"  ismap=""/>
                                    </a>
                                </li>
                            </ul>
                        </div>
                        <h:panelGroup rendered="#{sesionMBean.usuarioCda != null}" styleClass="cabezalUsuario">
                            <h:outputText value="Usuario: #{sesionMBean.usuarioCda}"></h:outputText>
                            <h:outputLink value="#{request.contextPath}/logoutcda">
                                <h:outputText value="#{sesionMBean.textos['cerrar_sesion']}" />
                            </h:outputLink>
                        </h:panelGroup>

                        <h:panelGroup rendered="#{sesionMBean.usuarioIduruguay!=null}" styleClass="cabezalUsuario">
                            <h:outputText value="Usuario: #{sesionMBean.usuarioIduruguay}"></h:outputText>
                            <p:commandLink id="lnkCerrarSesionIDURUGUAY"
                                           value="#{sesionMBean.textos['cerrar_sesion']}" action="#{sesionMBean.cerrarSesionIDURUGUAY()}" process="@this" update="@all" />
                        </h:panelGroup>
                    </div>
                </div>
            </div>
        </div>


        <div class="container-fluid" id="content" tabindex="-1">

            <ui:insert name="cuerpo">
            </ui:insert>


        </div>

        <ui:insert name="script">
        </ui:insert>

        <ui:insert name="js">
        </ui:insert>

        <div class="version">
            <h:outputText value="#{sesionMBean.textos['version']} #{sesionMBean.version}" />
        </div>

        <p:outputPanel rendered="#{not empty sesionMBean.googleAnalytics}">
            <h:outputText value="#{sesionMBean.googleAnalytics}"/>
        </p:outputPanel>

    </h:body>
</f:view>
</html>
