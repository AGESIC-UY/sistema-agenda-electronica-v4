<ui:composition template="/modificarReserva/Paso.template.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:h="http://java.sun.com/jsf/html">

    <ui:param name="parametroBean" value="#{modificarPaso1MBean}" />
    <ui:param name="agenda_nombre" value="#{modificarPaso1MBean.agendaNombre}" />
    <ui:param name="paso_numero" value="1" />
    <ui:param name="paso_texto" value="#{sesionMBean.textos['seleccionar_reserva']}" />
    <ui:param name="hay_error" value="#{modificarPaso1MBean.errorInit}" />
    <ui:param name="clase_columna_izq" value="columnaIzquierda col-sm-12" />
    <ui:param name="clase_columna_der" value="columnaDerecha" />
    <ui:param name="yaExisteReservaCamposClave" value="false" />
    <ui:param name="recursoSinDisponibilidad" value="false" />

    <ui:define name="descripcion">
    </ui:define>

    <ui:define name="mensaje">
    </ui:define>

    <ui:define name="contenido">
        <!-- Formulario de búsqueda por código de cancelación -->
        <p:outputPanel styleClass="form-required" rendered="#{!modificarPaso1MBean.errorInit and modificarPaso1MBean.mostrar=='BUSCAR_RESERVAS'}">
            <h:outputText value="#{sesionMBean.textos['los_campos_indicados_con_asterisco_son_obligatorios']}" />
        </p:outputPanel>

        <p:outputPanel id="filtroBusqueda" rendered="#{!modificarPaso1MBean.errorInit and modificarPaso1MBean.mostrar=='BUSCAR_RESERVAS'}">
            <p:outputPanel styleClass="form-required">
                <h:outputText value="#{sesionMBean.textos['debe_ingresar_al_menos_dos_de_los_datos_solicitados']}" />
            </p:outputPanel>
            <h:panelGroup id="camposFiltroCancelar" binding="#{modificarPaso1MBean.filtroConsulta}" layout="block" />
            <h:panelGroup id="codigoSeguridad" styleClass="Texto" layout="block">
                <fieldset>
                    <legend>
                        <h:outputText value="#{sesionMBean.textos['codigo_de_cancelacion_de_la_reserva']}" />
                    </legend>
                    <div class="row">
                        <p:outputPanel styleClass="form-group">
                            <h:outputLabel for="codSeg" class="col-sm-4 control-label label" value="#{sesionMBean.textos['ingrese_el_codigo_de_cancelacion']}" />
                            <p:outputPanel styleClass="col-sm-8">
                                <h:inputText id="codSeg" value="#{modificarPaso1MBean.sesionMBean.codigoSeguridadReserva}"/>
                                <p:message for="codSeg" />
                            </p:outputPanel>
                        </p:outputPanel>
                    </div>
                </fieldset>
            </h:panelGroup>
            <ul class="form-action-buttons" >
                <li class="action-buttons-primary">
                    <p:commandButton value="#{sesionMBean.textos['continuar']}"
                                     actionListener="#{modificarPaso1MBean.buscarReservaDatos}" update="@all" styleClass="btn-lg btn-primario" id="BtnContinuar" />
                </li>
            </ul>
        </p:outputPanel>

        <!-- Listar reservas encontradas -->
        <p:outputPanel rendered="#{!modificarPaso1MBean.errorInit and modificarPaso1MBean.mostrar=='LISTAR_RESERVAS'}">
            <p:outputPanel styleClass="form-required">
                <h:outputText value="#{sesionMBean.textos['seleccione_la_reserva_que_desea_modificar']}" />
            </p:outputPanel>
            <p:outputPanel>
                <p:outputPanel id="resultadosBusquedaCancelar">
                    <p:dataGrid id="resultadoBusquedaCancelar" layout="grid" columns="1" value="#{sesionMBean.listaReservas}" var="reserva"
                                emptyMessage="#{sesionMBean.textos['no_hay_datos_para_mostrar']}" rowIndexVar="rowIndex"
                                rendered="#{not empty sesionMBean.listaReservas}" >
                        <div class="box box-grey datosReservaCancelar">
                            <div class="row">
                                <div class="col-sm-12">
                                    <div class="fechaHoraReserva">
                                        <h:outputText value="#{sesionMBean.textos['su_reserva']}" />
                                    </div>
                                    <div class="fechaHoraReserva">
                                        <h:outputText value="#{reserva.disponibilidades[0].fecha}"
                                                      styleClass="resaltado">
                                            <f:convertDateTime type="date" pattern="dd 'de' MMMM 'de' yyyy" timeZone="#{sesionMBean.timeZone}" locale="#{sesionMBean.locale}" />
                                        </h:outputText>
                                        <h:outputText value=" #{sesionMBean.textos['a_las']} " />
                                        <h:outputText value="#{reserva.disponibilidades[0].horaInicio}" styleClass="resaltado">
                                            <f:convertDateTime type="date" pattern="#{sesionMBean.formatoHora}" timeZone="#{sesionMBean.timeZone}" locale="es" />
                                        </h:outputText>
                                        <h:outputText value="." />
                                    </div>
                                    <div>
                                        <h:outputText value="#{reserva.disponibilidades[0].recurso.nombre}" />
                                    </div>
                                </div>
                                <div class="col-sm-12 alinDer">
                                    <p:commandLink id="consultarLinkCancelar" action="#{modificarPaso1MBean.seleccionarReserva(rowIndex)}"
                                                   styleClass="btn-lg btn-primario" value="#{sesionMBean.textos['modificar_reserva']}">
                                        <h:graphicImage value="#{saeProperties['ui.resource.base.url']}/recursos/images/delete2.gif" style="border:0" height="16" width="16"
                                                        title="#{sesionMBean.textos['modificar_reserva']}" />
                                    </p:commandLink>
                                </div>
                            </div>
                        </div>
                    </p:dataGrid>
                    <ul class="form-action-buttons">
                        <li class="action-buttons-second">
                            <ul>
                                <li class="float-left">
                                    <h:commandButton styleClass="btn-lg btn-link" value="#{sesionMBean.textos['ir_a_la_busqueda_de_reservas']}"
                                                     action="pasoAnterior" />
                                </li>
                            </ul>
                        </li>
                    </ul>
                </p:outputPanel>
            </p:outputPanel>
        </p:outputPanel>
    </ui:define>

    <ui:define name="botones">
    </ui:define>
</ui:composition>
