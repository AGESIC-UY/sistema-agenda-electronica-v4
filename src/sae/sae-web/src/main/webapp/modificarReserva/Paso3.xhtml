<ui:composition template="/modificarReserva/Paso.template.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:h="http://java.sun.com/jsf/html">
    <ui:param name="parametroBean" value="#{modificarPaso3MBean}" />
    <ui:param name="agenda_nombre" value="#{modificarPaso3MBean.agendaNombre}" />
    <ui:param name="paso_numero" value="3" />
    <ui:param name="paso_texto" value="#{sesionMBean.textos['datos_necesarios']}" />
    <ui:param name="hay_error" value="#{modificarPaso3MBean.errorInit}" />
    <ui:param name="clase_columna_izq" value="columnaIzquierda col-sm-8" />
    <ui:param name="clase_columna_der" value="columnaDerecha col-sm-4" />
    <ui:param name="yaExisteReservaCamposClave" value="#{modificarPaso3MBean.yaExisteReservaCamposClave}" />
    <ui:param name="recursoSinDisponibilidad" value="false" />

    <ui:define name="descripcion">
        <f:view beforePhase="#{modificarPaso3MBean.beforePhase}" >
            <ul class="tips pasoTexto">
                <li><h:outputText value="#{sesionMBean.textos['datos_marcados_obligatorios']}."/></li>
            </ul>
            <p:outputPanel styleClass="descripcionAgenda">
                <pre>
				  <h:outputFormat value="#{modificarPaso3MBean.descripcion}" rendered="#{modificarPaso3MBean.descripcion != null}"/>
                </pre>
            </p:outputPanel>
            <p:outputPanel styleClass="descripcionAgenda">
                <pre>
				  <h:outputFormat value="#{modificarPaso3MBean.descripcionRecurso}" rendered="#{modificarPaso3MBean.descripcionRecurso != null}" />
                </pre>
            </p:outputPanel>
        </f:view>
    </ui:define>

    <ui:define name="mensaje">
        <div class="box box-grey datosReserva datoReservaPaso2">
            <div class="fechaHoraReserva">
                <h:outputText value="#{modificarPaso3MBean.diaSeleccionado}" styleClass="resaltado">
                    <f:convertDateTime type="date" pattern="dd 'de' MMMM 'de' yyyy" timeZone="#{sesionMBean.timeZone}" locale="#{sesionMBean.locale}"/>
                </h:outputText>
                <h:outputText value=" a las " />
                <h:outputText value="#{modificarPaso3MBean.horaSeleccionada}" styleClass="resaltado">
                    <f:convertDateTime type="time" pattern="#{sesionMBean.formatoHora}" timeZone="#{sesionMBean.timeZone}" />
                </h:outputText>
                <h:outputText value=" hs" />
            </div>
            <div>
                <h:outputText value="#{modificarPaso3MBean.recursoDescripcion}" />
            </div>
        </div>
    </ui:define>

    <ui:define name="contenido">
        <h:form id="formDin">
            <p:outputPanel>
                <p:outputPanel styleClass="form-horizontal" rendered="#{not empty modificarPaso3MBean.tramites}">
                    <fieldset>
                        <legend>
                            <h:outputText value="#{sesionMBean.textos['tramite']}" />
                        </legend>
                        <p:outputPanel styleClass="form-group">
                            <h:outputLabel value="#{sesionMBean.textos['tramite']}" for="tramite" styleClass="col-sm-3 control-label label formularioCampoRequerido" />
                            <p:outputPanel styleClass="col-sm-9">
                                <h:selectOneMenu id="tramite" value="#{modificarPaso3MBean.tramiteCodigo}">
                                    <f:selectItems value="#{modificarPaso3MBean.tramites}" />
                                </h:selectOneMenu>
                                <p:message for="tramite" styleClass="mensajeError" />
                            </p:outputPanel>
                        </p:outputPanel>
                    </fieldset>
                </p:outputPanel>

                <p:outputPanel id="formulario">
                    <h:panelGroup binding="#{modificarPaso3MBean.campos}" layout="block"/>
                </p:outputPanel>

                <fieldset>
                    <legend><h:outputText value="#{sesionMBean.textos['clausula_de_consentimiento_informado']}" /></legend>

                    <div class="form-horizontal">
                        <div class="form-group">
                            <div class="col-sm-12">
                                <p class="cursiva">
                                    <h:outputText value="#{modificarPaso3MBean.clausulaConsentimiento}" />
                                </p>
                            </div>
                        </div>
                        <h:panelGroup id="clausula" styleClass="form-group" layout="block">
                        <span class="control-label label formularioCampoRequerido">
                            <h:outputText value="#{sesionMBean.textos['terminos_de_la_clausula']}" />
                        </span>
                            <div>
                                <p:selectOneRadio id="condiciones"
                                                  value="#{modificarPaso3MBean.aceptaCondiciones}" layout="responsive"
                                                  columns="1">
                                    <f:selectItem itemLabel="#{sesionMBean.textos['acepto_los_terminos']}" itemValue="SI" />
                                    <f:selectItem itemLabel="#{sesionMBean.textos['no_acepto_los_terminos']}" itemValue="NO" />
                                </p:selectOneRadio>
                                <p:message id="mensajeCondiciones" for="condiciones" styleClass="mensajeError"/>
                            </div>
                        </h:panelGroup>
                    </div>
                </fieldset>

                <!-- Verificación de seguridad (CAPTCHA) -->
                <h:panelGroup layout="block">
                    <fieldset>
                        <legend>
                            <h:outputText value="#{sesionMBean.textos['verificacion_de_seguridad']}" />
                        </legend>
                        <div class="form-horizontal">
                            <h:panelGroup id="captcha" styleClass="form-group d-flex justify-content-center" layout="block">
                                <p:outputPanel styleClass="col-12 col-sm-8 mx-auto">
                                    <h:outputText styleClass="textoCaptcha" value="#{modificarPaso3MBean.textoIndicativoCaptcha}" />
                                    <h:inputText id="secureText" size="10" styleClass="form-control" value="#{modificarPaso3MBean.textoCaptchaUsuario}" />
                                    <p:commandLink styleClass="recargarCaptcha" id="btnRecargarCaptcha" value="#{sesionMBean.textos['solicitar_otra_frase']}"
                                                   actionListener="#{modificarPaso3MBean.recargarCaptcha}" update="captcha" />
                                    <p:message id="captchaErrorMessage" for="secureText" />
                                </p:outputPanel>
                            </h:panelGroup>
                        </div>
                    </fieldset>
                </h:panelGroup>
            </p:outputPanel>
        </h:form>
    </ui:define>

    <ui:define name="botones">
        <div class="container-fluid">
            <div class="row">
                <div class="col-6">
                    <h:commandButton styleClass="btn-lg btn-secundario" value="#{sesionMBean.textos['volver_paso_anterior']}}" action="#{modificarPaso3MBean.pasoAnterior}" />
                </div>
                <div class="col-6 d-flex justify-content-end">
                    <h:commandButton styleClass="btn-lg btn-primario" value="#{sesionMBean.textos['confirmar_modificacion']}"
                                     action="#{modificarPaso3MBean.confirmarModificacion}" process="formDin,@this,@all"/>
                </div>
            </div>
        </div>
    </ui:define>
</ui:composition>
