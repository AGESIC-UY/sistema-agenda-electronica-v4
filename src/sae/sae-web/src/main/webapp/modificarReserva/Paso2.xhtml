<ui:composition template="/modificarReserva/Paso.template.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:h="http://java.sun.com/jsf/html">

    <ui:param name="parametroBean" value="#{modificarPaso2MBean}" />
    <ui:param name="agenda_nombre" value="#{modificarPaso2MBean.agendaNombre}" />
    <ui:param name="paso_numero" value="2" />
    <ui:param name="paso_texto" value="#{sesionMBean.textos['seleccione_dia_y_hora']}" />
    <ui:param name="hay_error" value="#{modificarPaso2MBean.errorInit}" />

    <ui:define name="css">
        <h:outputStylesheet library="css" name="reservascalendar.css"/>
    </ui:define>

    <ui:define name="contenido">
        <p:outputPanel rendered="#{sesionMBean.agenda != null}" styleClass="form-horizontal">

            <!-- Selección de recurso -->
            <div id="recurso" class="form-group" rendered="#{not empty modificarPaso2MBean.recursosItems and modificarPaso2MBean.recursosItems.size() > 1}">
                <div class="row">
                    <div class="col-12 col-md-4">
                        <h:outputFormat value="#{sesionMBean.textos['paso_final_reserva_agenda']}" styleClass="label control-label" />
                    </div>
                    <div class="col-12 col-md-8">
                        <p:selectOneRadio value="#{modificarPaso2MBean.recursoId}" layout="responsive" columns="1"
                                          styleClass="radio-rich">
                            <p:ajax listener="#{modificarPaso2MBean.cambioRecursoAjax}"
                                    update="@form"
                                    process="@this" />
                            <f:selectItems value="#{modificarPaso2MBean.recursosItems}"/>
                        </p:selectOneRadio>
                    </div>
                </div>
            </div>

            <!-- 3 primeros turnos -->
            <p:outputPanel id="turnosDisponibles" styleClass="turnos-block"
                           rendered="#{not empty modificarPaso2MBean.primerasDisponibilidades or modificarPaso2MBean.mostrarCalendarioCompleto}">
                <div class="form-group row">
                    <div class="col-12 col-md-4">
                        <h:outputText styleClass="label control-label"
                                      value="#{sesionMBean.textos['turnos_disponibles']}"/>
                    </div>

                    <div class="col-12 col-md-8">
                        <!-- Botones verticales (primeros 3 turnos) -->
                        <div id="primeros-turnos" class="d-grid gap-2 mb-3">
                            <ui:repeat value="#{modificarPaso2MBean.primerasDisponibilidades}" var="d">
                                <p:commandButton styleClass="#{modificarPaso2MBean.disponibilidadSeleccionadaId eq d.disponibilidad.id
                              ? 'btn-lg btn-turno turno-seleccionado'
                              : 'btn-lg btn-turno'}"
                                                 value="#{d.label}"
                                                 actionListener="#{modificarPaso2MBean.seleccionarDisponibilidad}"
                                                 update="@form">
                                    <f:setPropertyActionListener target="#{modificarPaso2MBean.disponibilidadSeleccionada}"
                                                                 value="#{d.disponibilidad}"/>
                                    <f:setPropertyActionListener target="#{modificarPaso2MBean.disponibilidadSeleccionadaId}"
                                                                 value="#{d.disponibilidad.id}"/>
                                </p:commandButton>
                            </ui:repeat>
                        </div>

                        <!-- Toggle calendario -->
                        <div class="ver-calendario mb-3">
                            <p:commandLink styleClass="link-calendario"
                                           value="#{sesionMBean.textos['ver_calendario_completo']}"
                                           actionListener="#{modificarPaso2MBean.toggleMostrarCalendario}"
                                           update="@form"/>
                        </div>
                    </div>
                </div>
            </p:outputPanel>

            <!-- Calendario completo -->
            <p:outputPanel id="calendarioRow" rendered="#{modificarPaso2MBean.mostrarCalendarioCompleto}">
                <div class="form-group row">
                    <div class="col-12 col-md-4">
                        <h:outputText styleClass="label control-label"
                                      value="#{sesionMBean.textos['etiqueta_calendario']}"/>
                    </div>

                    <div class="col-12 col-md-8">
                        <div class="calendario-box">
                            <p:datePicker id="calendarioCompleto"
                                          value="#{modificarPaso2MBean.fechaSeleccionada}"
                                          pattern="#{sesionMBean.formatoFecha}"
                                          locale="es"
                                          disabledDates="#{modificarPaso2MBean.invalidDates}"
                                          mindate="#{modificarPaso2MBean.minDateTime}"
                                          maxdate="#{modificarPaso2MBean.maxDateTime}"
                                          inline="true">
                                <p:ajax event="dateSelect"
                                        listener="#{modificarPaso2MBean.onDateSelect}"
                                        update="@form"/>
                            </p:datePicker>
                            <p:outputPanel id="panelFecha" styleClass="panelFechaDatePicker">
                                <h:outputText value="#{modificarPaso2MBean.fechaSeleccionada}" >
                                    <f:convertDateTime dateStyle="full"  locale="#{sesionMBean.locale}"/>
                                </h:outputText>
                            </p:outputPanel>
                        </div>
                    </div>
                </div>
            </p:outputPanel>

            <!-- Combo horarios -->
            <p:outputPanel id="horariosRow" rendered="#{modificarPaso2MBean.mostrarCalendarioCompleto}">
                <div id="horariosRow" class="form-group row mt-3">
                    <div class="col-12 col-md-4">
                        <h:outputText styleClass="label control-label" value="#{sesionMBean.textos['horarios_disponibles']}"/>
                    </div>

                    <div class="col-12 col-md-8">
                        <p:selectOneMenu id="horarios_disponibles"
                                         value="#{modificarPaso2MBean.disponibilidadSeleccionadaId}"
                                         style="width: 100%; max-width: 27rem;">
                            <f:selectItems value="#{modificarPaso2MBean.todasDisponibilidadesItems}"/>
                            <p:ajax process="@this" update="@form"/>
                        </p:selectOneMenu>
                    </div>
                </div>
            </p:outputPanel>
        </p:outputPanel>
    </ui:define>

    <ui:define name="botones" >
        <div class="container-fluid">
            <div class="row">
                <div class="col-12 d-flex justify-content-end">
                    <h:commandButton styleClass="btn-lg btn-primario" 
                                     value="#{sesionMBean.textos['completar_datos']}"
                                     action="#{modificarPaso2MBean.siguientePaso}" />
                </div>
            </div>
        </div>
    </ui:define>
</ui:composition>
