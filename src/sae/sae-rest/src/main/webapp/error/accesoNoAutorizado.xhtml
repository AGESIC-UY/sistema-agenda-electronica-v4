<?xml version="1.0" encoding="ISO-8859-1" ?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:p="http://primefaces.org/ui"
      xmlns:h="http://java.sun.com/jsf/html"
      lang="#{sesionMBean.idiomaActual}">

    <h:head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title><h:outputText value="#{sesionMBean.textos['recurso_no_encontrado']}" /></title>
        <h:outputScript library="primefaces" name="jquery/jquery.js" />
        <script src="#{request.contextPath}/resources/js/jquery-ui.js" type="text/javascript"></script>
        <script src="#{request.contextPath}/resources/js/funcionesJS.js" type="text/javascript"></script>
        <script src="#{request.contextPath}/resources/js/bootstrap.min.js"></script>
        <link href="#{request.contextPath}/resources/css/bootstrap.min.css" rel="stylesheet" />
        <link href="#{request.contextPath}/resources/css/formulario-tipo.css" rel="stylesheet" />
        <link href="#{request.contextPath}/resources/css/agenda.css" rel="stylesheet" />

        <link href='https://fonts.googleapis.com/css?family=Open+Sans:400italic,700italic,400,300,700' rel='stylesheet' type='text/css' />
    </h:head>
    <h:body>
        <a class="sr-only sr-only-focusable saltar" href="#formLogin">
            <h:outputText value="#{sesionMBean.textos['saltar_al_contenido']}" />
        </a>

        <div class="cabezalLogin">
            <div class="container">
                <div class="row">
                    <div class="col-sm-8 cabezalEmpresa">
                        <div id="logo">
                            <div>
                                <h:outputText styleClass="nombre-activo" value="#{sesionMBean.textos['nombre_aplicacion']}" rendered="#{not empty sesionMBean.textos}" />
                                <h:outputText styleClass="nombre-activo" value="#{sesionMBean.textos['nombre_aplicacion']}" rendered="#{empty sesionMBean.textos}" />
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-4 cabezalTramites">
                        <div class="logosSecundarios">
                            <ul class="listaHorizontal">
                                <li>
                                    <a href="https://www.presidencia.gub.uy/" title="Ir al sitio de Presidencia">
                                        <img src="#{request.contextPath}/resources/images/logoPresidencia.png" alt="Presidencia" /></a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <p:outputPanel id="wrapper" rendered="#{sesionMBean.usuarioActual != null}">
            <div id="page-content-wrapper" tabindex="-1">
                <div class="datosCabezal">
                    <div class="row">
                        <div class="col-sm-12">
                            <div class="navbar-header">
                                <h:form id="mostrarAgendaRecurso">
                                    <ul>
                                        <li>
                                            <h:outputText value="#{sesionMBean.textos['usuario']}: #{sesionMBean.usuarioActual.nombre}" />
                                        </li>
                                        <li>
                                            <p:commandLink id="lnkCerrarSesion" value="#{sesionMBean.textos['cerrar_sesion']}"
                                                           action="#{sesionMBean.cerrarSesion}" process="@this" update="@all" oncomplete="redirect()"
                                                           rendered="#{sesionMBean.tipoLogout == 'LOCAL'}" />
                                            <h:outputLink value="#{request.contextPath}/logoutcda" rendered="#{sesionMBean.tipoLogout == 'CDA'}">
                                                <h:outputText value="#{sesionMBean.textos['cerrar_sesion']}" />
                                            </h:outputLink>
                                        </li>
                                    </ul>
                                    <div class="ui-helper-hidden-accessible">
                                        <h:commandButton value="dummy" tabindex="-1" />
                                    </div>
                                </h:form>
                            </div>
                        </div>
                    </div>
                </div>
                <a href="#menu-toggle" class="btn btn-default" id="menu-toggle">
                    <h:outputText value="#{sesionMBean.textos['menu']}" />
                </a>
                <h1>
                    <h:outputText value="#{nombre_pagina}" />
                </h1>
            </div>
        </p:outputPanel>

        <h:form styleClass="sesion-expirada" id="formLogin">
            <div class="container">
                <div class="dialog-box dialog-warning">
                    <div class="dialog-icon">
                        <span class="icn icn-warning-lg"></span>
                    </div>
                    <div class="dialog-data">
                        <span class="dialog-title">
                            <h:outputText value="#{sesionMBean.textos['acceso_denegado']}" rendered="#{not empty sesionMBean.textos}" />
                            <h:outputText value="#{sesionMBean.textos['acceso_denegado']}" rendered="#{empty sesionMBean.textos}" />
                        </span>
                        <p>
                            <h:outputText value="#{sesionMBean.textos['no_tiene_acceso_al_recurso_o_no_existe']}" rendered="#{not empty sesionMBean.textos}" />
                            <h:outputText value="#{sesionMBean.textos['no_tiene_acceso_al_recurso_o_no_existe']}" rendered="#{empty sesionMBean.textos}" />
                        </p>
                        <p>
                            <h:outputText value="#{sesionMBean.textos['si_error_contacte_al_administrador']}" rendered="#{not empty sesionMBean.textos}" />
                            <h:outputText value="#{sesionMBean.textos['si_error_contacte_al_administrador']}" rendered="#{empty sesionMBean.textos}" />
                        </p>
                    </div>
                </div>
            </div>
        </h:form>
    </h:body>
</html>
