<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:a="http://xmlns.jcp.org/jsf/passthrough">
		<h:head>
			<title><h:outputText value="Menu" /></title>
			<link href="#{request.contextPath}/resources/css/menu.css" rel="stylesheet" />
		</h:head>
        <ui:composition>
            <h:form id="formMenu">
                <div class="ui-helper-hidden-accessible">
                    <h1>
                        <h:outputText value="#{sessionMBean.textos['sae']}" />
                    </h1>
                </div>
                <div class="form-horizontal empresa">
                    <h:panelGroup class="form-group" rendered="#{fn:length(sessionMBean.empresasUsuario) > 1}">
                        <p:outputLabel for="empresa" value="#{sessionMBean.textos['empresa']}" styleClass="col-sm-6 control-label" />
                        <div class="col-sm-10">
                            <h:selectOneMenu id="empresa" value="#{sessionMBean.empresaActualId}" valueChangeListener="#{sessionMBean.cambioEmpresa}" styleClass="MyOneMenu">
                                <p:ajax update="@all" process="@this" />
                                <f:selectItems value="#{sessionMBean.empresasUsuario}" />
                            </h:selectOneMenu>
                        </div>
                    </h:panelGroup>
                </div>
                <div class="ui-helper-hidden-accessible">
                    <h2>
                        <h:outputText value="#{sessionMBean.textos['menu']}" />
                    </h2>
                </div>
                <p:panelMenu id="menuLateral" a:aria-level="1" >
                    <p:submenu id="submenuConfiguracion" label="#{sessionMBean.textos['configuracion']}" a:aria-level="2" rendered="#{sessionMBean.adminOrganismoActual}">
                        <p:menuitem value="#{sessionMBean.textos['configuracion_del_organismo']}" icon="fa-solid fa-pencil" url="#{request.contextPath}/administracion/configuracion/configuracion.xhtml" />
                    </p:submenu>
                    <p:submenu id="submenuEmpresas" label="#{sessionMBean.textos['empresas']}" a:aria-level="2" rendered="#{sessionMBean.adminOrganismoActual}">
                        <p:menuitem value="#{sessionMBean.textos['crear_empresa']}" icon="fa-solid fa-plus" url="#{request.contextPath}/administracion/empresa/editar.xhtml?n=t" />
                        <p:menuitem value="#{sessionMBean.textos['consultar_empresas']}" icon="fa-solid fa-magnifying-glass" url="#{request.contextPath}/administracion/empresa/consultar.xhtml" />
                    </p:submenu>
                    <p:submenu id="submenuUsuarios" label="#{sessionMBean.textos['usuarios']}" a:aria-level="2" rendered="#{sessionMBean.tieneRol('RA_AE_ADMINISTRADOR')}">
                        <p:menuitem value="#{sessionMBean.textos['crear_usuario']}" icon="fa-solid fa-plus" url="#{request.contextPath}/administracion/usuario/editar.xhtml?n=t" />
                        <p:menuitem value="#{sessionMBean.textos['consultar_usuarios']}" icon="fa-solid fa-magnifying-glass" url="#{request.contextPath}/administracion/usuario/consultar.xhtml" />
                        <p:menuitem value="#{sessionMBean.textos['consultar_usuarios_por_empresa']}" icon="fa-solid fa-magnifying-glass" url="#{request.contextPath}/administracion/usuario/consultar_por_empresa.xhtml" />
                        <p:menuitem value="#{sessionMBean.textos['gestionar_tokens']}" icon="fa-solid fa-magnifying-glass" url="#{request.contextPath}/administracion/usuario/tokens.xhtml" />
                    </p:submenu>
                    <p:submenu id="submenuAgendas" label="#{sessionMBean.textos['agendas']}" a:aria-level="2" rendered="#{sessionMBean.tieneRol('RA_AE_ADMINISTRADOR')}">
                        <p:menuitem value="#{sessionMBean.textos['crear_agenda']}" icon="fa-solid fa-plus" url="#{request.contextPath}/administracion/agenda/crear.xhtml" />
                        <p:menuitem value="#{sessionMBean.textos['consultar_agendas']}" icon="fa-solid fa-magnifying-glass" url="#{request.contextPath}/administracion/agenda/modificarConsultar.xhtml" />
                        <p:menuitem value="#{sessionMBean.textos['modificar_textos_de_agendas']}" icon="fa-solid fa-pencil" url="#{request.contextPath}/administracion/agenda/modificarTextos.xhtml" />
                        <p:menuitem value="#{sessionMBean.textos['actualizacion_masiva']}" icon="fa-solid fa-pencil" url="#{request.contextPath}/administracion/agenda/actualizacionMasiva.xhtml" rendered="#{sessionMBean.adminOrganismoActual}"/>
                    </p:submenu>
                    <p:submenu id="submenuRecursos" label="#{sessionMBean.textos['recursos']}" a:aria-level="2" rendered="#{sessionMBean.tieneRol('RA_AE_ADMINISTRADOR') or sessionMBean.tieneRol('RA_AE_ADMINISTRADOR_DE_RECURSOS')}">
                        <p:menuitem value="#{sessionMBean.textos['crear_recurso']}" icon="fa-solid fa-plus" url="#{request.contextPath}/administracion/recurso/crear.xhtml" rendered="#{sessionMBean.tieneRol('RA_AE_ADMINISTRADOR')}" />
                        <p:menuitem value="#{sessionMBean.textos['consultar_recursos']}" icon="fa-solid fa-magnifying-glass" url="#{request.contextPath}/administracion/recurso/modificarConsultar.xhtml" />
                        <p:menuitem value="#{sessionMBean.textos['modificar_textos_de_recursos']}" icon="fa-solid fa-pencil" url="#{request.contextPath}/administracion/recurso/modificarTextos.xhtml" />
                        <p:menuitem value="#{sessionMBean.textos['importar_recurso']}" icon="fa-solid fa-upload" url="#{request.contextPath}/administracion/recurso/importar.xhtml" />
                        <p:menuitem value="#{sessionMBean.textos['carga_masiva']}" icon="fa-solid fa-upload" url="#{request.contextPath}/administracion/recurso/cargaMasiva.xhtml" rendered="#{sessionMBean.adminOrganismoActual}" />
                    </p:submenu>
                    <p:submenu id="submenuDatosASolicitar" label="#{sessionMBean.textos['datos_a_solicitar']}" a:aria-level="2" rendered="#{sessionMBean.tieneRol('RA_AE_ADMINISTRADOR')}">
                        <p:menuitem value="#{sessionMBean.textos['agrupaciones']}" icon="fa-solid fa-circle" url="#{request.contextPath}/administracion/datoASolicitar/modificarAgrupaciones.xhtml" />
                        <p:menuitem value="#{sessionMBean.textos['crear_dato']}" icon="fa-solid fa-plus" url="#{request.contextPath}/administracion/datoASolicitar/crear.xhtml" />
                        <p:menuitem value="#{sessionMBean.textos['consultar_datos']}" icon="fa-solid fa-magnifying-glass" url="#{request.contextPath}/administracion/datoASolicitar/modificarConsultar.xhtml" />
                    </p:submenu>
                    <p:submenu id="submenuDisponibilidades" label="#{sessionMBean.textos['disponibilidades']}" a:aria-level="2" rendered="#{sessionMBean.tieneRol('RA_AE_ADMINISTRADOR') or sessionMBean.tieneRol('RA_AE_PLANIFICADOR') or sessionMBean.tieneRol('RA_AE_PLANIFICADOR_X_RECURSO') or sessionMBean.tieneRol('RA_AE_ADMINISTRADOR_DE_RECURSOS')}">
                        <p:menuitem value="#{sessionMBean.textos['consultar_disponibilidades']}" icon="fa-solid fa-magnifying-glass" url="#{request.contextPath}/administracion/disponibilidad/consultarDisponibilidades.xhtml" />
                        <p:menuitem value="#{sessionMBean.textos['generar_un_dia']}" icon="fa-solid fa-plus" url="#{request.contextPath}/administracion/disponibilidad/crearDisponibilidades.xhtml" />
                        <p:menuitem value="#{sessionMBean.textos['copiar_dia']}" icon="fa-solid fa-copy" url="#{request.contextPath}/administracion/disponibilidad/generarPatronDia.xhtml" />
                        <p:menuitem value="#{sessionMBean.textos['modificar_cupos']}" icon="fa-solid fa-pencil" url="#{request.contextPath}/administracion/disponibilidad/modificarCupo.xhtml" />
                        <p:menuitem value="#{sessionMBean.textos['eliminar_semana']}" icon="fa-solid fa-xmark" url="#{request.contextPath}/administracion/disponibilidad/eliminarDisponibilidadesSemana.xhtml" rendered="false" />
                        <p:menuitem value="#{sessionMBean.textos['eliminar_periodo']}" icon="fa-solid fa-xmark" url="#{request.contextPath}/administracion/disponibilidad/eliminarDisponibilidadesPeriodo.xhtml" />
                    </p:submenu> 
                    <p:submenu id="submenuValidaciones" label="#{sessionMBean.textos['validaciones']}" a:aria-level="2" rendered="#{sessionMBean.tieneRol('RA_AE_ADMINISTRADOR')}">
                        <p:menuitem value="#{sessionMBean.textos['definir']}" icon="fa-solid fa-plus" url="#{request.contextPath}/administracion/validaciones/mantenimiento.xhtml" />
                        <p:menuitem value="#{sessionMBean.textos['asociar']}" icon="fa-solid fa-pencil" url="#{request.contextPath}/administracion/validaciones/asociacion.xhtml" />
                    </p:submenu>
                    <p:submenu id="submenuAcciones" label="#{sessionMBean.textos['acciones']}" a:aria-level="2" rendered="#{sessionMBean.tieneRol('RA_AE_ADMINISTRADOR')}">
                        <p:menuitem value="#{sessionMBean.textos['definir']}" icon="fa-solid fa-plus" url="#{request.contextPath}/administracion/acciones/mantenimiento.xhtml" />
                        <p:menuitem value="#{sessionMBean.textos['asociar']}" icon="fa-solid fa-pencil" url="#{request.contextPath}/administracion/acciones/asociacion.xhtml" />
                    </p:submenu>
                    <p:submenu id="submenuReservas" label="#{sessionMBean.textos['reservas']}" a:aria-level="2" rendered="#{sessionMBean.tieneRol('RA_AE_ADMINISTRADOR') or sessionMBean.tieneRol('RA_AE_FCALL_CENTER') or sessionMBean.tieneRol('RA_AE_ADMINISTRADOR_DE_RECURSOS')}">
                        <p:menuitem value="#{sessionMBean.textos['reservar']}" icon="fa-solid fa-calendar" url="#{request.contextPath}/administracion/reserva/Paso1.xhtml" />
                        <p:menuitem value="#{sessionMBean.textos['cancelar_reserva']}" icon="fa-solid fa-xmark" url="#{request.contextPath}/administracion/reserva/cancelarReserva.xhtml" />
                        <p:menuitem value="#{sessionMBean.textos['atencion_presencial']}" icon="fa-solid fa-user" url="#{request.contextPath}/administracion/reserva/atencionPresencial.xhtml" />
                        <p:menuitem value="#{sessionMBean.textos['cancelar_reserva_por_periodo']}" icon="fa-solid fa-xmark" url="#{request.contextPath}/administracion/reserva/cancelarReservasPeriodo.xhtml" rendered="#{sessionMBean.tieneRol('RA_AE_ADMINISTRADOR')}" />
                        <p:menuitem value="#{sessionMBean.textos['reservas_canceladas']}" icon="fa-solid fa-magnifying-glass" url="#{request.contextPath}/administracion/consulta/consultarCancelaciones.xhtml" rendered="#{sessionMBean.tieneRol('RA_AE_ADMINISTRADOR')}"/>
                        <p:menuitem value="#{sessionMBean.textos['mover_reservas']}" icon="fa-solid fa-arrow-right-arrow-left" url="#{request.contextPath}/administracion/reserva/moverReservas.xhtml" rendered="#{sessionMBean.adminOrganismoActual}" />
                    </p:submenu>
                    <p:submenu id="submenuLlamador" label="#{sessionMBean.textos['llamador']}" a:aria-level="2" rendered="#{sessionMBean.tieneRol('RA_AE_ADMINISTRADOR') or sessionMBean.tieneRol('RA_AE_LLAMADOR') or sessionMBean.tieneRol('RA_AE_FATENCION') or sessionMBean.tieneRol('RA_AE_ADMINISTRADOR_DE_RECURSOS')}">
                        <p:menuitem value="#{sessionMBean.textos['lista_de_espera']}" icon="fa-solid fa-clock" url="#{request.contextPath}/administracion/llamador/listaDeEspera.xhtml"
                                    rendered="#{sessionMBean.tieneRol('RA_AE_ADMINISTRADOR') or sessionMBean.tieneRol('RA_AE_FATENCION') or sessionMBean.tieneRol('RA_AE_ADMINISTRADOR_DE_RECURSOS')}" />
                        <p:menuitem value="#{sessionMBean.textos['abrir_llamador']}" icon="fa-solid fa-volume" url="#{request.contextPath}/administracion/llamador/configurarLlamador.xhtml"
                                    rendered="#{sessionMBean.tieneRol('RA_AE_LLAMADOR') or sessionMBean.tieneRol('RA_AE_ADMINISTRADOR_DE_RECURSOS') or sessionMBean.tieneRol('RA_AE_ADMINISTRADOR')}" />
                    </p:submenu>
                    <p:submenu id="submenuConsultas" label="#{sessionMBean.textos['consultas']}" a:aria-level="2" rendered="#{sessionMBean.tieneRol('RA_AE_ADMINISTRADOR') or sessionMBean.tieneRol('RA_AE_FCALL_CENTER') or sessionMBean.tieneRol('AE_R_GENERADORREPORTES_X_RECURSO') or sessionMBean.tieneRol('RA_AE_ADMINISTRADOR_DE_RECURSOS')}">
                        <p:menuitem value="#{sessionMBean.textos['reserva_por_id']}" icon="fa-solid fa-magnifying-glass" url="#{request.contextPath}/administracion/consulta/consultarReservaId.xhtml" />
                        <p:menuitem value="#{sessionMBean.textos['reserva_por_numero']}" icon="fa-solid fa-magnifying-glass" url="#{request.contextPath}/administracion/consulta/consultarReservaNumero.xhtml" />
                        <p:menuitem value="#{sessionMBean.textos['reserva_por_datos']}" icon="fa-solid fa-magnifying-glass" url="#{request.contextPath}/administracion/consulta/consultarReservaDatos.xhtml" />
                    </p:submenu>
                    <p:submenu id="submenuReportes" label="#{sessionMBean.textos['reportes']}" a:aria-level="2" rendered="#{sessionMBean.tieneRol('RA_AE_ADMINISTRADOR') or sessionMBean.tieneRol('AE_R_GENERADORREPORTES_X_RECURSO')}">
                        <p:menuitem value="#{sessionMBean.textos['reporte_reservas']}" icon="fa-solid fa-magnifying-glass" url="#{request.contextPath}/administracion/consulta/consultarReservaPeriodo.xhtml" />
                        <p:menuitem value="#{sessionMBean.textos['reporte_asistencias']}" icon="fa-solid fa-magnifying-glass" url="#{request.contextPath}/administracion/consulta/consultarAsistenciaPeriodo.xhtml" />
                        <p:menuitem value="#{sessionMBean.textos['reporte_atencion_funcionario']}" icon="fa-solid fa-magnifying-glass" url="#{request.contextPath}/administracion/consulta/consultarAtencionFuncPeriodo.xhtml" rendered="#{sessionMBean.tieneRol('RA_AE_ADMINISTRADOR')}" />
                        <p:menuitem value="#{sessionMBean.textos['reporte_tiempo_atencion_funcionario']}" icon="fa-solid fa-magnifying-glass" url="#{request.contextPath}/administracion/consulta/consultarTiempoAtencionFun.xhtml" rendered="#{sessionMBean.tieneRol('RA_AE_ADMINISTRADOR')}" />
                        <p:menuitem value="#{sessionMBean.textos['reporte_atencion_presencial']}" icon="fa-solid fa-magnifying-glass" url="#{request.contextPath}/administracion/consulta/consultarAtencionPresencialPeriodo.xhtml" rendered="#{sessionMBean.tieneRol('RA_AE_ADMINISTRADOR') or sessionMBean.tieneRol('AE_R_GENERADORREPORTES_X_RECURSO')}" />
                    </p:submenu>
                </p:panelMenu>
                <div class="version">
                    <h:outputText value="#{sessionMBean.textos['version']} #{sessionMBean.version}"></h:outputText>
                </div>
                <div class="ui-helper-hidden-accessible">
                    <h:commandButton value="dummy" tabindex="-1" />
                </div>
            </h:form>
        </ui:composition>
</html>
