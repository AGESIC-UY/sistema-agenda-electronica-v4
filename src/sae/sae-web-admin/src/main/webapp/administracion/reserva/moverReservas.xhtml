<ui:composition template="/templates/layout.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:jsf="http://xmlns.jcp.org/jsf"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:cp="http://sae-web">
    <ui:param name="nombre_pagina" value="#{sessionMBean.pantallaTitulo}" />
    <ui:define name="cuerpo">
        <h:outputStylesheet  library="css" name="disponibilidadescalendar.css" />
        <f:view beforePhase="#{moverReservasMBean.beforePhaseMoverReservas}">

            <p:outputPanel rendered="#{sessionMBean.agendaMarcada != null and sessionMBean.recursoMarcado != null}">
                <h:form id="form">
                    <p:outputPanel id="pnlForm">
                        <p:outputPanel styleClass="form-required">
                            <h:outputText value="#{sessionMBean.textos['los_campos_indicados_con_asterisco_son_obligatorios']}" />
                        </p:outputPanel>
                        <p:outputPanel id="pnlDatosReservas">
                            <fieldset>
                                <legend>
                                    <h:outputText value="#{sessionMBean.textos['paso_uno_datos_reservas_mover']}"  />
                                </legend>
                                <p:outputPanel styleClass="form-horizontal">
                                    <p:outputPanel styleClass="form-group">
                                        <p:outputLabel value="#{sessionMBean.textos['agenda_origen']}" for="txtAgendaOrigen"
                                                       styleClass="col-sm-4 control-label label " />
                                        <p:outputPanel styleClass="col-sm-8">
                                            <h:inputText id="txtAgendaOrigen" value="#{sessionMBean.agendaMarcada.nombre}" maxlength="100" size="100"
                                                         styleClass="form-control" readonly="true" />
                                            <p:message for="txtAgendaOrigen" />
                                        </p:outputPanel>
                                    </p:outputPanel>
                                    <p:outputPanel  styleClass="form-group">
                                        <p:outputLabel value="#{sessionMBean.textos['recurso_origen']}" for="txtRecursoOrigen"
                                                       styleClass="col-sm-4 control-label label " />
                                        <p:outputPanel styleClass="col-sm-8">
                                            <h:inputText id="txtRecursoOrigen" value="#{sessionMBean.recursoMarcado.nombre}" maxlength="100" size="100"
                                                         styleClass="form-control" readonly="true" />
                                            <p:message for="txtRecursoOrigen" />
                                        </p:outputPanel>
                                    </p:outputPanel>
                                    <p:outputPanel styleClass="form-group">
                                        <p:outputLabel value="#{sessionMBean.textos['fecha_reservas']}" for="datFechaReservas"
                                                       styleClass="col-sm-4 control-label label formularioCampoRequerido" />
                                        <p:outputPanel styleClass="col-sm-8">
                                            <cp:inputDate id="datFechaReservas"  value="#{moverReservasMBean.moverReservasFecha}" pattern="yyyy-MM-dd">
                                                <f:converter converterId="dateConverter"/>
                                            </cp:inputDate>
                                            <p:message for="datFechaReservas" />
                                        </p:outputPanel>
                                    </p:outputPanel>
                                    <p:outputPanel id="seleccionHoraDP" styleClass="form-group">
                                        <p:outputLabel value="#{sessionMBean.textos['hora_de_inicio']}" for="seleccionHoraD" styleClass="col-sm-4 control-label label formularioCampoRequerido"/>
                                        <p:outputPanel styleClass="col-sm-8 container_tiempo">
                                            <h:selectOneMenu id="seleccionHoraD" styleClass="horasselect tiempo_item" disabled="#{moverReservasMBean.disablePaso1}" value="#{moverReservasMBean.horaD}">
                                                <f:selectItems value="#{moverReservasMBean.horas}" />
                                            </h:selectOneMenu>
                                            <h:outputText value=" : " />
                                            <h:outputLabel value="minutos" for="seleccionMinD" styleClass="ui-helper-hidden-accessible formularioCampoRequerido" />
                                            <h:selectOneMenu id="seleccionMinD" styleClass="horasselect tiempo_item" disabled="#{moverReservasMBean.disablePaso1}" value="#{moverReservasMBean.minD}">
                                                <f:selectItems value="#{moverReservasMBean.minutos}" />
                                            </h:selectOneMenu>
                                            <h:outputText styleClass="comentario timezoneText" value="#{sessionMBean.textos['zona_horaria']}: #{sessionMBean.timeZone.ID}" />
                                            <p:message for="seleccionHoraD" />
                                        </p:outputPanel>
                                    </p:outputPanel>
                                    <p:outputPanel id="seleccionHoraHP" styleClass="form-group">
                                        <p:outputLabel value="#{sessionMBean.textos['hora_de_fin']}" for="seleccionHoraH" styleClass="col-sm-4 control-label label formularioCampoRequerido"/>
                                        <p:outputPanel styleClass="col-sm-8 container_tiempo">
                                            <h:selectOneMenu id="seleccionHoraH" styleClass="horasselect tiempo_item" disabled="#{moverReservasMBean.disablePaso1}" value="#{moverReservasMBean.horaH}">
                                                <f:selectItems value="#{moverReservasMBean.horas}" />
                                            </h:selectOneMenu>
                                            <h:outputText value=" : " />
                                            <p:outputLabel value="minutos" for="seleccionMinH" styleClass="ui-helper-hidden-accessible formularioCampoRequerido" />
                                            <h:selectOneMenu id="seleccionMinH" styleClass="horasselect tiempo_item" disabled="#{moverReservasMBean.disablePaso1}" value="#{moverReservasMBean.minH}">
                                                <f:selectItems value="#{moverReservasMBean.minutos}" />
                                            </h:selectOneMenu>
                                            <h:outputText styleClass="comentario timezoneText" value="#{sessionMBean.textos['zona_horaria']}: #{sessionMBean.timeZone.ID}" />
                                            <p:message for="seleccionHoraH" />
                                        </p:outputPanel>
                                    </p:outputPanel>
                                    <p:outputPanel id="moverReservasEnviarCorreo" styleClass="form-group">
                                        <p:outputLabel for ="chkMoverReservasEnviarCorreo" value="#{sessionMBean.textos['enviar_correo']}" styleClass="col-sm-4 control-label label" />
                                        <p:outputPanel styleClass="col-sm-8 elemento_reservas">
                                            <p:selectBooleanCheckbox id="chkMoverReservasEnviarCorreo"
                                                                     value="#{moverReservasMBean.moverReservasEnviarCorreo}" disabled="#{moverReservasMBean.disablePaso1}" />
                                            <p:outputLabel value="#{sessionMBean.textos['enviar_correo']}" for="chkMoverReservasEnviarCorreo" />
                                        </p:outputPanel>
                                    </p:outputPanel>
                                    <p:outputPanel id="moverReservasGenerarNovedades" styleClass="form-group">
                                        <p:outputLabel for="chkMoverReservasGenerarNovedades" value="#{sessionMBean.textos['generar_novedades']}" styleClass="col-sm-4 control-label label" />
                                        <p:outputPanel styleClass="col-sm-8 elemento_reservas">
                                            <p:selectBooleanCheckbox id="chkMoverReservasGenerarNovedades"
                                                                     value="#{moverReservasMBean.moverReservasGenerarNovedades}" disabled="#{moverReservasMBean.disablePaso1}"/>
                                            <p:outputLabel value="#{sessionMBean.textos['generar_novedades']}" for="chkMoverReservasGenerarNovedades" />
                                        </p:outputPanel>
                                    </p:outputPanel>
                                    <p:outputPanel styleClass="form-group">
                                        <p:outputPanel styleClass="col-sm-12 offset-sm-10 mover_reservas_enviar">
                                            <p:commandButton id="btnSiguiente" value="#{sessionMBean.textos['validar']}" update=":form:seleccionHoraDP,:form:seleccionHoraHP,:form:moverReservasEnviarCorreo,:form:moverReservasGenerarNovedades,:form:paso2" process="@form"
                                                             action="#{moverReservasMBean.validarRecursoOrigen}" styleClass="btn btn-primario" rendered="#{!moverReservasMBean.verPaso2}" />
                                        </p:outputPanel>
                                    </p:outputPanel>
                                </p:outputPanel>
                            </fieldset>
                            <p:outputPanel  id="paso2">
                                <p:outputPanel  rendered="#{moverReservasMBean.verPaso2}">
                                    <fieldset>
                                        <legend>
                                            <h:outputText value="#{sessionMBean.textos['paso_dos_datos_reservas_mover']}"  />
                                        </legend>
                                        <p:outputPanel styleClass="form-horizontal">
                                            <p:outputPanel id="selAgendaDestinoPanel" styleClass="form-group">
                                                <h:outputLabel value="#{sessionMBean.textos['agenda_destino']}" for="selAgendaDestino"
                                                               styleClass="col-sm-4 control-label label formularioCampoRequerido" />
                                                <p:outputPanel styleClass="col-sm-8">
                                                    <h:selectOneMenu id="selAgendaDestino" value="#{moverReservasMBean.moverReservasAgendaDestinoId}"
                                                                     valueChangeListener="#{moverReservasMBean.moverReservasAgendaSeleccionada}" styleClass="textoLargo"
                                                                     disabled="#{sessionrReservasMBean.paso==2}">
                                                        <p:ajax update="pnlMoverReservasRecursoDestino" listener="#{moverReservasMBean.moverReservasAgendaSeleccionada}" />
                                                        <f:selectItems value="#{moverReservasMBean.moverReservasAgendasDisponibles}" />
                                                    </h:selectOneMenu>
                                                    <p:message for="selAgendaDestino" />
                                                </p:outputPanel>
                                            </p:outputPanel>
                                            <p:outputPanel id="pnlMoverReservasRecursoDestino" styleClass="form-group">
                                                <h:outputLabel value="#{sessionMBean.textos['recurso_destino']}" for="selRecursoDestino"
                                                               styleClass="col-sm-4 control-label label formularioCampoRequerido" />
                                                <p:outputPanel styleClass="col-sm-8">
                                                    <h:selectOneMenu id="selRecursoDestino" value="#{moverReservasMBean.moverReservasRecursoDestinoId}"
                                                                     styleClass="textoLargo"  disabled="#{moverReservasMBean.paso==2}">
                                                        <f:selectItems value="#{moverReservasMBean.moverReservasRecursosDisponibles}" />
                                                    </h:selectOneMenu>
                                                    <p:message for="selRecursoDestino" />
                                                </p:outputPanel>
                                            </p:outputPanel>
                                            <p:outputPanel styleClass="form-group">
                                                <h:outputLabel value="#{sessionMBean.textos['fecha_destino']}" for="datFechaReservas"
                                                               styleClass="col-sm-4 control-label label formularioCampoRequerido" />
                                                <p:outputPanel styleClass="col-sm-8">
                                                    <input jsf:id="datFechaDestino"
                                                           jsf:value="#{moverReservasMBean.moverReservasFechaDestino}" data-required="true"
                                                           type="date" autofocus="autofocus">
                                                        <f:converter converterId="dateConverter"/>
                                                    </input>
                                                    <p:message for="datFechaDestino" />
                                                </p:outputPanel>
                                            </p:outputPanel>
                                            <p:outputPanel id="horasPanel" styleClass="form-group">
                                                <h:outputLabel value="#{sessionMBean.textos['hora_de_inicio']}" for="seleccionHoraD" styleClass="col-sm-4 control-label label formularioCampoRequerido"/>
                                                <p:outputPanel styleClass="col-sm-8">
                                                    <h:selectOneMenu id="seleccionHoraDestino" styleClass="horasselect" value="#{moverReservasMBean.horaInicioDestino}" disabled="#{moverReservasMBean.paso==2}">
                                                        <f:selectItems value="#{moverReservasMBean.horas}" />
                                                    </h:selectOneMenu>
                                                    <h:outputText value=" : " />
                                                    <h:outputLabel value="minutos" for="seleccionMinDestino" styleClass="ui-helper-hidden-accessible formularioCampoRequerido" />
                                                    <h:selectOneMenu id="seleccionMinDestino" styleClass="horasselect" value="#{moverReservasMBean.minInicioDestino}" disabled="#{moverReservasMBean.paso==2}">
                                                        <f:selectItems value="#{moverReservasMBean.minutos}" />
                                                    </h:selectOneMenu>
                                                    <h:outputText styleClass="comentario timezoneText" value="#{sessionMBean.textos['zona_horaria']}: #{sessionMBean.timeZone.ID}" />
                                                    <p:message for="seleccionHoraDestino" />
                                                </p:outputPanel>
                                            </p:outputPanel>


                                            <p:outputPanel styleClass="form-group" rendered="#{moverReservasMBean.paso==1}">
                                                <p:outputPanel styleClass="col-sm-9 offset-sm-3">
                                                    <p:commandButton id="btnValidar" value="#{sessionMBean.textos['validar']}" update="form:panelEjecutar" process="@form,form:datFechaDestino"
                                                                     action="#{moverReservasMBean.moverReservasValidar}" styleClass="btn btn-primario"  />
                                                </p:outputPanel>
                                            </p:outputPanel>
                                            <p:outputLabel id="panelEjecutar">
                                                <p:outputPanel styleClass="form-group" rendered="#{moverReservasMBean.paso==2 and !moverReservasMBean.reservasMovidas}">
                                                    <p:outputPanel styleClass="col-sm-4 offset-sm-3">
                                                        <p:commandButton id="btnEjecutar" value="#{sessionMBean.textos['ejecutar']}" update="form:pnlForm"
                                                                         actionListener="#{moverReservasMBean.moverReservasEjecutar}" styleClass="btn btn-primario"
                                                                         disabled="#{not moverReservasMBean.permitirMoverReservas}"
                                                                         onstart="PF('buiEjecutar').show();"
                                                                         oncomplete="PF('buiEjecutar').hide();" />
                                                    </p:outputPanel>
                                                </p:outputPanel>
                                            </p:outputLabel>
                                        </p:outputPanel>
                                    </fieldset>
                                </p:outputPanel>
                            </p:outputPanel>

                            <ul class="form-action-buttons">
                                <li class="action-buttons-second">
                                    <ul>
                                        <li class="float-left">
                                            <p:commandButton value="#{sessionMBean.textos['cancelar']}" action="#{moverReservasMBean.cancelar}" immediate="true" styleClass="btn-lg btn-link" />
                                        </li>
                                    </ul>
                                </li>
                            </ul>

                            <p:blockUI id="buiEjecutar" widgetVar="buiEjecutar" block="pnlDatosReservas" >
                                Moviendo reservas, por favor espere...<br />
                                <p:graphicImage library="images" name="loading.gif"/>
                            </p:blockUI>

                        </p:outputPanel>
                    </p:outputPanel>

                </h:form>
            </p:outputPanel>
        </f:view>
    </ui:define>
</ui:composition>
