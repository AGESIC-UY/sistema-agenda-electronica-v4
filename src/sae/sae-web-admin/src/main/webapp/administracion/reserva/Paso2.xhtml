<ui:composition template="/administracion/reserva/Paso.template.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:a="http://xmlns.jcp.org/jsf/passthrough">
    <ui:param name="parametroBean" value="#{paso2AdminMBean}" />
    <ui:param name="agenda_nombre" value="#{paso2AdminMBean.agendaNombre}" />
    <ui:param name="paso_numero" value="2" />
    <ui:param name="paso_texto" value="#{sessionMBean.textos['datos_necesarios']}" />
    <ui:param name="hay_error" value="false" />
    <ui:param name="clase_columna_izq" value="columnaIzquierda col-sm-8" />
    <ui:param name="clase_columna_der" value="columnaDerecha col-sm-4" />
    <ui:param name="yaExisteReservaCamposClave" value="#{paso2AdminMBean.yaExisteReservaCamposClave}" />
    <ui:param name="recursoSinDisponibilidad" value="false" />

    <ui:define name="descripcion">
        <f:view beforePhase="#{paso2AdminMBean.beforePhase}" >
            <ul class="tips pasoTexto">
                <li><h:outputText value="#{sessionMBean.textos['datos_marcados_obligatorios']}." /></li>
            </ul>
            <p:outputPanel styleClass="descripcionAgenda">
                <pre>
				  <h:outputFormat value="#{paso2AdminMBean.descripcion}" rendered="#{paso2AdminMBean.descripcion != null}"/>
                </pre>
            </p:outputPanel>
            <p:outputPanel styleClass="descripcionAgenda">
                <pre>
				  <h:outputFormat value="#{paso2AdminMBean.descripcionRecurso}" rendered="#{paso2AdminMBean.descripcionRecurso != null}" />
                </pre>
            </p:outputPanel>
        </f:view>
    </ui:define>

    <ui:define name="mensaje">
        <div class="box box-grey datosReserva datoReservaPaso2">
            <div class="fechaHoraReserva">
                <h:outputText value="#{paso2AdminMBean.diaSeleccionado}" styleClass="resaltado">
                    <f:convertDateTime type="date" pattern="dd 'de' MMMM 'de' yyyy" timeZone="#{sessionMBean.timeZone}" locale="#{sessionMBean.locale}"/>
                </h:outputText>
                <h:outputText value=" a las " />
                <h:outputText value="#{paso2AdminMBean.horaSeleccionada}" styleClass="resaltado">
                    <f:convertDateTime type="time" pattern="#{sessionMBean.formatoHora}" timeZone="#{sessionMBean.timeZone}" />
                </h:outputText>
                <h:outputText value=" hs" />
            </div>
            <div>
                <h:outputText value="#{paso2AdminMBean.recursoDescripcion}" />
            </div>
        </div>
    </ui:define>
    <ui:define name="contenido">
        <h:form id="formDin">
            <p:outputPanel>
                <p:outputPanel styleClass="form-horizontal" rendered="#{not empty paso2AdminMBean.tramites}">
                    <fieldset>
                        <legend>
                            <h:outputText value="#{sessionMBean.textos['tramite']}" />
                        </legend>
                        <h:panelGroup id="tramiteGroup" styleClass="form-group" layout="block">
                            <h:outputLabel value="#{sessionMBean.textos['tramite']}" for="tramite" styleClass="col-sm-3 control-label label formularioCampoRequerido" />
                            <p:outputPanel styleClass="col-sm-9">
                                <h:selectOneMenu id="tramite" value="#{paso2AdminMBean.tramiteCodigo}">
                                    <f:selectItems value="#{paso2AdminMBean.tramites}" />
                                </h:selectOneMenu>
                                <p:message for="tramite" styleClass="mensajeError" />
                            </p:outputPanel>
                        </h:panelGroup>
                    </fieldset>
                </p:outputPanel>

                <p:outputPanel id="formulario">
                    <h:panelGroup binding="#{paso2AdminMBean.campos}" layout="block"/>
                </p:outputPanel>

                <fieldset>
                    <legend><h:outputText value="#{sessionMBean.textos['clausula_de_consentimiento_informado']}" /></legend>

                    <div class="form-horizontal">
                        <div class="form-group">
                            <div class="col-sm-12">
                                <p class="cursiva">
                                    <h:outputText value="#{paso2AdminMBean.clausulaConsentimiento}" />
                                </p>
                            </div>
                        </div>
                        <h:panelGroup id="clausula" styleClass="form-group row justify-content-center" layout="block">
                            <h:outputLabel value="#{sessionMBean.textos['terminos_de_la_clausula']}" styleClass="col-sm-6 control-label label formularioCampoRequerido" />
                            <div class="col-sm-6">
                                <p:selectOneRadio id="condiciones"
                                                  value="#{paso2AdminMBean.aceptaCondiciones}" layout="responsive"
                                                  columns="1">
                                    <f:selectItem itemLabel="#{sessionMBean.textos['acepto_los_terminos']}" itemValue="SI" />
                                    <f:selectItem itemLabel="#{sessionMBean.textos['no_acepto_los_terminos']}" itemValue="NO" />
                                </p:selectOneRadio>
                                <p:message id="mensajeCondiciones" for="condiciones" styleClass="mensajeError"/>
                            </div>
                        </h:panelGroup>
                    </div>
                </fieldset>

                <ul class="form-action-buttons">
                    <li class="action-buttons-primary">
                        <ul>
                            <li>
                                <p:commandButton styleClass="btn-lg btn-primario" value="#{sessionMBean.textos['confirmar_reserva']}"
                                                 action="#{paso2AdminMBean.confirmarReserva}" ajax="false"/>
                            </li>
                        </ul>
                    </li>
                    <li class="action-buttons-second">
                        <ul>
                            <li class="float-left">
                                <h:commandButton styleClass="btn-lg btn-primario"  value="#{sessionMBean.textos['volver_paso_anterior']}" action="pasoAnterior" />
                            </li>
                        </ul>
                    </li>
                </ul>
            </p:outputPanel>
        </h:form>
    </ui:define>

    <ui:define name="botones">
    </ui:define>
</ui:composition>
