<ui:composition template="/templates/layout.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:cp="http://sae-web"
                xmlns:h="http://java.sun.com/jsf/html">
    <ui:param name="nombre_pagina" value="#{sessionMBean.pantallaTitulo}" />
    <ui:define name="cuerpo">
        <h:outputStylesheet  library="css" name="disponibilidadescalendar.css" />

        <f:view beforePhase="#{disponibilidadMBean.beforePhaseConsultar}" >
            <p:outputPanel rendered="#{sessionMBean.agendaMarcada != null and sessionMBean.recursoMarcado != null}">
                <h:form id="form">
                    <p:outputPanel styleClass="form-required">
                        <h:outputText value="#{sessionMBean.textos['los_campos_indicados_con_asterisco_son_obligatorios']}" />
                    </p:outputPanel>
                    <fieldset>
                        <legend>
                            <h:outputText value="#{sessionMBean.textos['periodo_a_consultar']}" />
                        </legend>
                        <p:outputPanel styleClass="form-horizontal">

                            <p:outputPanel styleClass="form-group">
                                <h:outputLabel value="#{sessionMBean.textos['desde']}" for="fDesde" styleClass="col-sm-3 control-label label formularioCampoRequerido" />
                                <p:outputPanel styleClass="col-sm-9">
                                    <cp:inputDate id="fDesde"  value="#{dispSessionMBean.fechaDesde}" pattern="yyyy-MM-dd">
                                        <f:converter converterId="dateConverter"/>
                                    </cp:inputDate>
                                    <p:message for="fDesde" />
                                </p:outputPanel>
                            </p:outputPanel>

                            <p:outputPanel styleClass="form-group">
                                <h:outputLabel value="#{sessionMBean.textos['hasta']}" for="fHasta" styleClass="col-sm-3 control-label label" />
                                <p:outputPanel styleClass="col-sm-9">
                                    <cp:inputDate id="fHasta"  value="#{dispSessionMBean.fechaHasta}" pattern="yyyy-MM-dd">
                                        <f:converter converterId="dateConverter"/>
                                    </cp:inputDate>
                                    <p:message for="fHasta" />
                                </p:outputPanel>
                            </p:outputPanel>

                            <p:outputPanel styleClass="form-group">
                                <p:outputPanel styleClass="col-sm-9 offset-sm-3">
                                    <p:commandButton value="#{sessionMBean.textos['consultar']}" action="#{disponibilidadMBean.obtenerCuposCons}"
                                                      update="form:panelDisponibilidad,fHasta" process="fDesde,fHasta,@this"  styleClass="btn-lg btn-primario" />
                                </p:outputPanel>
                            </p:outputPanel>
                        </p:outputPanel>
                    </fieldset>

                    <p:outputPanel id="panelDisponibilidad">
                        <p:dataTable id="tablaCupos" value="#{dispSessionMBean.cuposPorDia}" var="row" rowIndexVar="rowIndex"
                                     caption="#{sessionMBean.textos['disponibilidades_en_periodo_consultado']}" 
                                     emptyMessage="#{sessionMBean.textos['no_hay_datos_para_mostrar']}"
                                     paginator="true" rows="#{sessionMBean.tablasFilasPorPagina}" 
                                     paginatorTemplate="{FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink}" 
                                     paginatorFirstPageLabel="#{sessionMBean.textos['pagina_primera']}"
                                     paginatorPrevPageLabel="#{sessionMBean.textos['pagina_anterior']}"
                                     paginatorNextPageLabel="#{sessionMBean.textos['pagina_siguiente']}"
                                     paginatorLastPageLabel="#{sessionMBean.textos['pagina_ultima']}"
                                     rowStyleClass="#{(rowIndex mod 2) eq 0 ? 'par' : 'impar'}"
                                     styleClass = "table">
                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="#{sessionMBean.textos['fecha']}"></h:outputText>
                                </f:facet>
                                <h:outputText value="#{row.data.dia}">
                                    <f:convertDateTime type="both" pattern="#{sessionMBean.formatoFecha}" timeZone="#{sessionMBean.timeZone}" locale="#{sessionMBean.locale}" />

                                </h:outputText>
                            </p:column>

                            <p:column>
                                <f:facet name="header">
                                    <h:outputText value="#{sessionMBean.textos['cupos_disponibles']}"></h:outputText>
                                </f:facet>
                                <h:outputText value="#{row.data.cupoDisponible}"></h:outputText>
                            </p:column>

                            <p:column styleClass="alinCentro">
                                <f:facet name="header">
                                    <h:outputText value="#{sessionMBean.textos['acciones']}"></h:outputText>
                                </f:facet>
                                <p:commandButton id="consultarLink" value="#{sessionMBean.textos['ver_detalles']}" 
                                                 action="#{disponibilidadMBean.configurarDisponibilidadesDelDia(rowIndex)}"
                                                 icon="fa-solid fa-search" styleClass="ui-button-icon-only" title="#{sessionMBean.textos['ver_detalles']}">
                                </p:commandButton>
                            </p:column>
                        </p:dataTable>
                    </p:outputPanel>
                </h:form>
            </p:outputPanel>

        </f:view>
    </ui:define>
</ui:composition>
