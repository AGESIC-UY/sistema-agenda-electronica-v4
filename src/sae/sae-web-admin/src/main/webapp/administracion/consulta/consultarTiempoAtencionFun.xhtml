<ui:composition template="/templates/layout.xhtml"
  xmlns="http://www.w3.org/1999/xhtml"
  xmlns:p="http://primefaces.org/ui"
  xmlns:ui="http://java.sun.com/jsf/facelets"
  xmlns:f="http://java.sun.com/jsf/core"
  xmlns:cp="http://sae-web"
  xmlns:h="http://java.sun.com/jsf/html">
	<ui:param name="nombre_pagina" value="#{sessionMBean.pantallaTitulo}" />
	<ui:define name="cuerpo">
		<h:outputStylesheet  library="css" name="disponibilidadescalendar.css" />
		<f:view beforePhase="#{consultaMBean.beforePhaseConsultarTiempoAtencionFuncionario}" >
			<h:form id="form">
        <p:outputPanel styleClass="form-required">
          <h:outputText value="#{sessionMBean.textos['los_campos_indicados_con_asterisco_son_obligatorios']}" />
        </p:outputPanel>
				<fieldset>
					<legend>
						<h:outputText value="#{sessionMBean.textos['reporte_tiempos_de_atencion']}" />
					</legend>
					<p:outputPanel styleClass="form-horizontal">
						<p:outputPanel styleClass="form-group">
							<h:outputLabel value="#{sessionMBean.textos['fecha_de_inicio']}" for="fechaDesde" styleClass="col-sm-3 label formularioCampoRequerido" />
							<p:outputPanel styleClass="col-sm-9">
								<cp:inputDate id="fechaDesde"  value="#{reporteMBean.fechaDesde}"  pattern="yyyy-MM-dd">
									<f:converter converterId="dateConverter"/>
								</cp:inputDate>
								<p:message for="fechaDesde" />
							</p:outputPanel>
						</p:outputPanel>
						<p:outputPanel styleClass="form-group">
							<h:outputLabel value="#{sessionMBean.textos['fecha_de_fin']}" for="fechaHasta" styleClass="col-sm-3 label formularioCampoRequerido" />
							<p:outputPanel styleClass="col-sm-9">
								<cp:inputDate id="fechaHasta"  value="#{reporteMBean.fechaHasta}"  pattern="yyyy-MM-dd">
									<f:converter converterId="dateConverter"/>
								</cp:inputDate>
								<p:message for="fechaHasta" />
							</p:outputPanel>
						</p:outputPanel>
						
						<p:outputPanel styleClass="form-group">
							<h:outputText value="#{sessionMBean.textos['empresas']}" styleClass="col-sm-3 label" />
							<p:outputPanel styleClass="col-sm-9">
								<p:selectBooleanCheckbox value="#{reporteMBean.todasLasEmpresas}" id="checkEmpresas" />
								<p:outputLabel value="#{sessionMBean.textos['considerar_todas']}" for="checkEmpresas" />
							</p:outputPanel>
						</p:outputPanel>
					</p:outputPanel>

				</fieldset>
				<ul class="form-action-buttons">
				  <li class="action-buttons-primary">
					  <p:commandButton value="#{sessionMBean.textos['consultar']}" actionListener="#{reporteMBean.reporteTiemposAtencion}" styleClass="btn-lg btn-primario" update="@form"  process="fechaDesde,fechaHasta,@form"/>
					  <p:commandButton value="#{sessionMBean.textos['descargar']}" disabled="#{reporteMBean.printer==null}" action="#{reporteMBean.print}" ajax="false" styleClass="btn-lg btn-secundario" />
				  </li>
				</ul>
			</h:form>
		</f:view>
	</ui:define>
</ui:composition>
