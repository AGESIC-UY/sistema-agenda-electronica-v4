<ui:composition template="/templates/layout.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:cp="http://sae-web"
                xmlns:h="http://java.sun.com/jsf/html">
    <ui:param name="nombre_pagina" value="#{sessionMBean.pantallaTitulo}" />
    <ui:define name="cuerpo">
        <h:outputStylesheet  library="css" name="disponibilidadescalendar.css" />
        <f:view
            beforePhase="#{consultaMBean.beforePhaseConsultarReservaPeriodo}" >
            <p:outputPanel>
                <h:form id="form">
                    <p:outputPanel styleClass="form-required">
                        <h:outputText value="#{sessionMBean.textos['los_campos_indicados_con_asterisco_son_obligatorios']}" />
                    </p:outputPanel>
                    <fieldset id="basic">
                        <legend>
                            <h:outputText value="#{sessionMBean.textos['reporte_reserva_por_periodo_y_estado']}" />
                        </legend>
                        <p:outputPanel styleClass="form-horizontal">

                            <p:outputPanel styleClass="form-group">
                                <p:outputLabel value="#{sessionMBean.textos['fecha_desde']}" for="fechaDesde" styleClass="col-sm-3 control-label label formularioCampoRequerido" />
                                <p:outputPanel styleClass="col-sm-9">
                                    <cp:inputDate id="fechaDesde"  value="#{reporteMBean.fechaDesde}" pattern="yyyy-MM-dd">
                                        <f:converter converterId="dateConverter"/>
                                    </cp:inputDate>
                                    <p:message for="fechaDesde" />
                                </p:outputPanel>
                            </p:outputPanel>

                            <p:outputPanel styleClass="form-group">
                                <p:outputLabel value="#{sessionMBean.textos['fecha_hasta']}" for="fechaHasta" styleClass="col-sm-3 control-label label formularioCampoRequerido" />
                                <p:outputPanel styleClass="col-sm-9">
                                    <cp:inputDate id="fechaHasta"  value="#{reporteMBean.fechaHasta}" pattern="yyyy-MM-dd">
                                        <f:converter converterId="dateConverter"/>
                                    </cp:inputDate>
                                    <p:message for="fechaHasta" />
                                </p:outputPanel>
                            </p:outputPanel>

                            <p:outputPanel styleClass="form-group">
                                <p:outputLabel value="#{sessionMBean.textos['estado']}" for="estado" styleClass="col-sm-3 control-label label formularioCampoRequerido" />
                                <p:outputPanel styleClass="col-sm-9">
                                    <h:selectOneMenu id="estado" value="#{reporteMBean.estadoReservaSeleccionado}">
                                        <f:selectItems value="#{reporteMBean.estadosReserva}" />
                                    </h:selectOneMenu>
                                    <p:message for="estado" />
                                </p:outputPanel>
                            </p:outputPanel>
                        </p:outputPanel>
                    </fieldset>
                    <ul class="form-action-buttons">
                        <li class="action-buttons-primary">
                            <p:commandButton value="#{sessionMBean.textos['consultar']}" action="#{reporteMBean.reporteReservasFecha}" styleClass="btn-lg btn-primario"
                                             update="@form" process="form:fechaDesde,form:fechaHasta,@form"/>
                            <p:commandButton value="#{sessionMBean.textos['descargar']}" disabled="#{reporteMBean.printer==null}" action="#{reporteMBean.print}" ajax="false" styleClass="btn-lg btn-secundario" />
                        </li>
                    </ul>
                </h:form>
            </p:outputPanel>
        </f:view>
    </ui:define>
</ui:composition>
