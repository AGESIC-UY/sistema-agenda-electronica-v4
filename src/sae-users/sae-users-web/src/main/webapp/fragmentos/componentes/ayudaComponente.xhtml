<ui:composition xmlns:ui="http://xmlns.jcp.org/jsf/facelets"                 
                xmlns="http://www.w3.org/1999/xhtml"                 
                xmlns:c="http://xmlns.jcp.org/jsp/jstl/core"                 
                xmlns:f="http://xmlns.jcp.org/jsf/core"                 
                xmlns:h="http://xmlns.jcp.org/jsf/html"                 
                xmlns:p="http://primefaces.org/ui"
                xmlns:o="http://omnifaces.org/ui">    

    <p:remoteCommand name="showSidebar" action="#{ayudaMostrarBean.showSidebar()}" update="form:ayudaDetail"/>
    <p:commandButton title="#{msg.ayuda}" icon="glyphicon glyphicon-question-sign"
                                 id="btnAyuda" styleClass="btn btn-icono btn-ayuda" oncomplete="PF('sidebar').show()"/>
    <p:sidebar widgetVar="sidebar" position="right" baseZIndex="90000" style="overflow-y: auto;" onShow="showSidebar()">
        <p:outputPanel id="ayudaDetail">                
            <h:panelGroup rendered="#{ayudaMostrarBean.rendered}">                     
                <p:tabView>
                    <p:tab title="#{msg.ayudaTextoTab}">
                        <h:outputText value="#{ayuda.ayuExplicacion}" />
                    </p:tab>
                </p:tabView>              
            </h:panelGroup>            
        </p:outputPanel>   
    </p:sidebar>


</ui:composition>
