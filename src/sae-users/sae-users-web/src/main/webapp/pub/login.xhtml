<ui:composition xmlns:ui="http://java.sun.com/jsf/facelets"
                template="./../WEB-INF/templateLogin.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:c="http://java.sun.com/jsp/jstl/core"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:p="http://primefaces.org/ui">


    <ui:define name="content">
        <div class="logocontent">
            <img src="../imagenes/logoPresidencia.png" alt=""/>
        </div>
        <div class="d-flex" id="wrapper">        
            <div class="login-form">
                <form action="j_security_check" method="post" name="frmLogin">
                    <p:messages  styleClass="mensajeError"/>
                    <div>
                        <h2 class="text-center iniciar-sesion">SAE - Gestión de usuarios administradores</h2>   
                        <div class="form-group">
                            <p:outputLabel value="Usuario"></p:outputLabel>
                            <div class="input-group-prepend">
                                <span class="input-group-text"><i class="glyphicon glyphicon-user"></i></span>
                                <input type="text" class="form-control" name="j_username" placeholder="Username" required="required"/>				
                            </div>
                        </div>
                        <div class="form-group">
                            <p:outputLabel value="Contraseña"></p:outputLabel>
                            <div class="input-group-prepend">
                                <span class="input-group-text"><i class="glyphicon glyphicon-lock"></i></span>
                                <input type="password" class="form-control" name="j_password" placeholder="Password" required="required"/>				
                            </div>
                        </div>  

                        <div class="form-group">
                            <button type="submit" class="btn btn-primary login-btn btn-block">Iniciar sesión</button>
                        </div>
                    </div>
                </form>
            </div>        
        </div>        
    </ui:define>

</ui:composition>
