<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:p="http://primefaces.org/ui"
      lang="#{gestionSessionMB.language}" >
    <f:view locale="#{gestionSessionMB.locale}">
        <h:head>
            <f:facet name="first">
                <meta http-equiv="X-UA-Compatible" content="IE=edge" />
                <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<!--                <link rel="icon" type="image/png" href="./../imagenes/favicon.png" />-->
                <link href="https://fonts.googleapis.com/css?family=Lato" rel="stylesheet"/>
                <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
            </f:facet>
            <f:facet name="middle">
                 <!-- jQuery (necessary for Bootstrap's JavaScript plugins) -->
                <h:outputScript library="primefaces" name="jquery/jquery.js"/>
                <!-- Latest compiled and minified JavaScript -->
                <h:outputScript name="bootstrap-4.1.0-dist/js/bootstrap.bundle.min.js"/>
            </f:facet>
            <title><h:outputText value="#{gestionSessionMB.nombreAplicacion}"/></title>
        </h:head>

        <h:body>
            <f:facet name="last">
                <h:outputStylesheet name="bootstrap-4.1.0-dist/css/bootstrap.min.css" />
                <h:outputStylesheet name="css/glyphicon.css"/>
                <h:outputStylesheet name="css/custom.css"/>
            </f:facet>
            <div id="skip">
                <a href="#content">#{msg.skip}</a>
            </div>

            <div class="wrap login">

                <div id="content" class="content-general">
                    <div class="container">
                        <div class="containerLogin">
                            <ui:insert name="content">Content</ui:insert>
                        </div>
                    </div>
                </div>

                <div id="bottom" class="bottom">
                    <div class="container">
                        <ui:insert name="bottom">
                            <div class="ui-grid-col-12 text_right">  
                                <span><h:outputText value="#{msg.hversion}: #{applicationBean.version}"></h:outputText></span>
                            </div>
                        </ui:insert> 
                    </div>
                </div>
            </div>
        </h:body>
    </f:view>
</html>
