<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"           
      xmlns:f="http://xmlns.jcp.org/jsf/core"                 
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:o="http://omnifaces.org/ui"
      lang="#{gestionSessionMB.language}" >
    <f:view locale="#{gestionSessionMB.locale}">
        <h:head>
            <f:facet name="first">
                <meta http-equiv="X-UA-Compatible" content="IE=edge" />
                <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<!--                <link rel="icon" type="image/png" href="./../imagenes/favicon.png" />-->
                <link href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:400,600" rel="stylesheet" />
                <link href="https://fonts.googleapis.com/css?family=Roboto&amp;display=swap" rel="stylesheet" />
                <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
            </f:facet>
            <f:facet name="middle">
                <!-- jQuery (necessary for Bootstrap's JavaScript plugins) -->
                <h:outputScript library="primefaces" name="jquery/jquery.js"/>
                <!-- Latest compiled and minified JavaScript -->
                <h:outputScript name="bootstrap-4.1.0-dist/js/bootstrap.bundle.min.js"/>
            </f:facet>
            <title><h:outputText value="#{gestionSessionMB.nombreAplicacion}"/></title>

        </h:head>

        <h:body>
            <f:facet name="last">
                <h:outputStylesheet name="bootstrap-4.1.0-dist/css/bootstrap.min.css" />
                <h:outputStylesheet name="css/glyphicon.css"/>
                <h:outputStylesheet name="css/custom.css"/>
            </f:facet>
            <o:importConstants type="uy.com.sofis.constantes.ConstantesPaginas"/>
            <o:importConstants type="uy.com.sofis.constantes.ConstantesAyuda"/>
            <o:importConstants type="uy.com.sofis.constantes.ConstantesOperaciones"/>
            <h:form>
                <p:idleMonitor timeout="#{idleMonitorBean.sessionTimeOut}" onidle="PF('idleDialog').show()" />
                <p:confirmDialog id="confirmDialog"
                                 message="#{msg.sessionTimeOut}" closable="false"
                                 header="#{msg.sessionTimeOutHeader}" widgetVar="idleDialog">
                    <p:commandButton id="Logout" value="#{msg.irAInicio}"
                                     styleClass="btn btn-primary" ajax="false"
                                     action="#{idleMonitorBean.redirect()}" />
                </p:confirmDialog>
            </h:form>

            <div id="skip">
                <a href="#content">#{msg.skip}</a>
            </div>
            <div class="main">
                <div class="wrapper">
                    <nav id="sidebar">
                        <button type="button" id="sidebarCollapseDescktop" class="btn btn-link navbar-btn">
                            <span class="sr-only">Desplegar menu</span>
                            <span class="icon-bar"></span>
                            <span class="icon-bar"></span>
                            <span class="icon-bar"></span>
                        </button>
                        <button type="button" id="sidebarCollapse" class="btn btn-link navbar-btn">
                            <span class="sr-only">Desplegar menu</span>
                            <span class="icon-bar"></span>
                            <span class="icon-bar"></span>
                            <span class="icon-bar"></span>
                        </button>
                        <!-- Sidebar Header -->
                        <div class="sidebar-header">
                            <ui:insert name="top">
                                <img src="./../imagenes/logoPresidencia.png" alt="#{gestionSessionMB.nombreAplicacion}" />
                                <h1 class="ui-helper-hidden-accessible"><h:outputText value="#{gestionSessionMB.nombreAplicacion}"/></h1>
                            </ui:insert>
                        </div>

                        <!-- Sidebar Links -->
                        <p:outputPanel styleClass="sidebar-body">
                            <h:form id="frmMenu" styleClass="frmMenu"  >
                                <p:menu styleClass="sidebar-nav" id="menu"
                                        model="#{menuView.model}" toggleable="true"/>                            
                            </h:form>
                        </p:outputPanel>

                        <div class="sidebar-footer">

                        </div>
                    </nav>
                    <h:form id="frmLogout" styleClass="frmSalir">
                        <div class="panel-usuario">
                            <span class="glyphicon glyphicon-user"></span>
                            <h:outputText value="#{msg.usuario} #{inicioManagedBean.nombreUsuario}" styleClass="usuario" />


                            <div class="dropdown">
                                <button type="button" class="btn btn-icono" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                                    <span class="glyphicon glyphicon-option-vertical"></span>
                                </button>
                                <div class="dropdown-menu dropdown-menu-right">
                                    <div class="row">
                                        <div class="datos-usuario">
                                            <h:outputText value="#{inicioManagedBean.nombreUsuario}" styleClass="nombre-usuario" />
                                            <p:commandButton styleClass="btn btn-primary" 
                                                             icon="glyphicon glyphicon-log-out"
                                                             value="#{msg.salir}" 
                                                             action="#{gestionSessionMB.logout()}"/>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </h:form>
                    <div id="content" class="content-general">
                        <div id="main-content" >
                            <p:messages id="tmsg" showDetail="true" globalOnly="false" for="tmsg" closable="true">
                                <p:autoUpdate />
                            </p:messages>
                            <ui:insert name="content">Content</ui:insert>
                        </div>
                    </div>
                    <div class="overlay"></div>
                </div>
                <div id="bottom" class="bottom">
                    <ui:insert name="bottom">
                        <div class="row">
                            <div class="col-sm-1 texto-left">
                                <img src="../imagenes/logoPresidencia.png" alt="" width="100"/>
                            </div>
                            <div class="col-sm-11 texto-right">
                                <h:outputText value="" class="datos-mined"/>
                                 <h:outputText title="#{msg.hfechaMod}: #{applicationBean.timestamp}" value="#{msg.hversion}: #{applicationBean.version}"></h:outputText>
                            </div>
                            
                        </div>
                    </ui:insert>
                </div>
            </div>

            <script src="./../js/JsUtils.js"></script>

        </h:body>
    </f:view>
</html>
